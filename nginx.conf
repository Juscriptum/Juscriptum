# ============================================
# Production Nginx Configuration
# Security-hardened for Law Organizer
# ============================================

# Run as non-root user
user nginx-user;

# Auto-detect number of CPU cores
worker_processes auto;

# Set maximum open file descriptors
worker_rlimit_nofile 65535;

# Error log path
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    # Maximum simultaneous connections per worker
    worker_connections 4096;

    # Accept multiple connections at once
    multi_accept on;

    # Use epoll for Linux
    use epoll;
}

http {
    # Include MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============================================
    # Logging Configuration
    # ============================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ============================================
    # Performance Optimizations
    # ============================================
    # Sendfile - efficient file transfer
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Keepalive settings
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Hide nginx version
    server_tokens off;

    # Buffer sizes
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    client_max_body_size 100M;
    large_client_header_buffers 4 8k;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ============================================
    # Rate Limiting Zones
    # ============================================
    # General API rate limit: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Login rate limit: 5 requests/second per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;

    # General rate limit: 20 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=20r/s;

    # Connection limit per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================
    # SSL/TLS Security Settings (for production)
    # ============================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ============================================
    # Security Headers Map
    # ============================================
    map $sent_http_content_type $content_security_policy {
        ~text/html "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';";
    }

    # ============================================
    # Server Block
    # ============================================
    server {
        # Listen on port 8080 (non-root can't bind to 80)
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # ============================================
        # Security Headers
        # ============================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy $content_security_policy always;

        # HSTS (uncomment for production with HTTPS)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ============================================
        # Connection Limits
        # ============================================
        limit_conn conn_limit 50;

        # ============================================
        # Health Check Endpoint
        # ============================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Re-resolve Docker service names so backend container recreation does
        # not leave nginx pinned to a stale bridge-network IP.
        resolver 127.0.0.11 valid=10s ipv6=off;
        resolver_timeout 5s;
        set $backend_upstream backend:3000;

        location = /api/health {
            access_log off;
            proxy_pass http://$backend_upstream/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        location = /api/readiness {
            access_log off;
            proxy_pass http://$backend_upstream/readiness;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ============================================
        # API Proxy to Backend
        # ============================================
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=30 nodelay;

            # Preserve the request path when proxying through a variable-based
            # upstream, otherwise nginx collapses /api/foo to the bare upstream
            # URI and drops the intended /v1/foo route.
            rewrite ^/api/(.*)$ /v1/$1 break;

            # Proxy settings
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;

            # Connection headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection '';

            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Proxy buffers
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Disable caching for API
            proxy_cache_bypass $http_upgrade;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ============================================
        # Login Endpoint - Stricter Rate Limiting
        # ============================================
        location /api/auth/login {
            limit_req zone=login_limit burst=5 nodelay;

            proxy_pass http://$backend_upstream/v1/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================
        # Static Files with Caching
        # ============================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            # Cache static assets for 1 year
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";

            # Disable access logging for static files
            access_log off;
        }

        # ============================================
        # SPA Fallback
        # ============================================
        location / {
            # Rate limiting
            limit_req zone=general_limit burst=50 nodelay;

            # SPA routing
            try_files $uri $uri/ /index.html;

            # Cache control for HTML
            add_header Cache-Control "no-cache";
        }

        # ============================================
        # Security: Block Sensitive Files
        # ============================================
        location ~ /\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(env|git|gitignore|dockerignore|md|yml|yaml|sh)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============================================
        # Error Pages
        # ============================================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
