# ============================================
# Kubernetes Namespace
# ============================================
apiVersion: v1
kind: Namespace
metadata:
  name: law-organizer
  labels:
    name: law-organizer
    environment: production
---
# ============================================
# ConfigMap - Application Configuration
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: law-organizer
data:
  NODE_ENV: "production"
  PORT: "3000"
  DATABASE_PORT: "5432"
  REDIS_PORT: "6379"
  JWT_ACCESS_TOKEN_EXPIRY: "15m"
  JWT_REFRESH_TOKEN_EXPIRY: "7d"
  THROTTLE_TTL: "60000"
  THROTTLE_LIMIT: "100"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  ENABLE_RLS: "false"
  ENABLE_AUDIT_LOGGING: "true"
  ENABLE_WEBHOOKS: "true"
  STORAGE_PROVIDER: "s3"
  AWS_REGION: "eu-north-1"
  AWS_S3_BUCKET: "law-organizer-uploads"
---
# ============================================
# Secret - Database Credentials
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: database-secret
  namespace: law-organizer
type: Opaque
immutable: false
stringData:
  host: "postgres-postgresql.database.svc.cluster.local"
  port: "5432"
  user: "law_organizer"
  password: "CHANGE_ME_USE_SEALED_SECRETS"
  name: "law_organizer"
---
# ============================================
# Secret - Redis Credentials
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: law-organizer
type: Opaque
immutable: false
stringData:
  host: "redis-master.database.svc.cluster.local"
  port: "6379"
  password: "CHANGE_ME_USE_SEALED_SECRETS"
---
# ============================================
# Secret - Application Secrets
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: law-organizer
type: Opaque
immutable: false
stringData:
  jwt-secret: "CHANGE_ME_MIN_32_CHARS_USE_SEALED_SECRETS"
  jwt-refresh-secret: "CHANGE_ME_MIN_32_CHARS_USE_SEALED_SECRETS"
  encryption-key: "CHANGE_ME_32_HEX_CHARS_USE_SEALED_SECRETS"
---
# ============================================
# Secret - Payment Provider Credentials
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: payment-secrets
  namespace: law-organizer
type: Opaque
immutable: false
stringData:
  stripe-secret-key: "sk_live_CHANGE_ME"
  stripe-webhook-secret: "whsec_CHANGE_ME"
  wayforpay-merchant-account: "CHANGE_ME"
  wayforpay-merchant-secret-key: "CHANGE_ME"
---
# ============================================
# Secret - AWS/S3 Credentials
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: aws-secrets
  namespace: law-organizer
type: Opaque
immutable: false
stringData:
  aws-access-key-id: "CHANGE_ME"
  aws-secret-access-key: "CHANGE_ME"
---
# ============================================
# Secret - Monitoring Credentials
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secrets
  namespace: law-organizer
type: Opaque
immutable: false
stringData:
  sentry-dsn: "https://CHANGE_ME@sentry.io/CHANGE_ME"
  new-relic-license-key: "CHANGE_ME"
