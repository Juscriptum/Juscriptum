# ============================================
# Ingress Configuration
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: law-organizer-ingress
  namespace: law-organizer
  annotations:
    # Cert Manager
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/acme-challenge-type: HTTP01

    # Nginx Ingress
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # CSP Header
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # HSTS
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "true"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - laworganizer.ua
        - www.laworganizer.ua
        - api.laworganizer.ua
      secretName: law-organizer-tls
  rules:
    # Main domain
    - host: laworganizer.ua
      http:
        paths:
          # API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: law-organizer-backend
                port:
                  number: 3000
          # Frontend routes
          - path: /
            pathType: Prefix
            backend:
              service:
                name: law-organizer-frontend
                port:
                  number: 80

    # WWW redirect
    - host: www.laworganizer.ua
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: law-organizer-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: law-organizer-frontend
                port:
                  number: 80

    # API subdomain
    - host: api.laworganizer.ua
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: law-organizer-backend
                port:
                  number: 3000
---
# ============================================
# Cluster Issuer for Let's Encrypt
# ============================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@laworganizer.ua
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
---
# ============================================
# Cluster Issuer for Staging
# ============================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@laworganizer.ua
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            class: nginx
