# ============================================
# Monitoring Stack - Prometheus ServiceMonitor
# ============================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: law-organizer-backend
  namespace: law-organizer
  labels:
    app: law-organizer
    component: backend
    release: prometheus
spec:
  selector:
    matchLabels:
      app: law-organizer
      component: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
# ============================================
# PrometheusRule - Alerts
# ============================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: law-organizer-alerts
  namespace: law-organizer
  labels:
    app: law-organizer
    release: prometheus
spec:
  groups:
    - name: law-organizer.rules
      rules:
        # High Error Rate
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="law-organizer",status=~"5.."}[5m])) /
            sum(rate(http_requests_total{namespace="law-organizer"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: High error rate detected
            description: Error rate is {{ $value | humanizePercentage }} for the last 5 minutes

        # High Latency
        - alert: HighLatency
          expr: |
            histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace="law-organizer"}[5m])) by (le)) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: High latency detected
            description: P95 latency is {{ $value }}s

        # Pod Crashes
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="law-organizer"}[15m]) > 0.1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Pod is crash looping
            description: Pod {{ $labels.pod }} is restarting frequently

        # Memory Usage
        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{namespace="law-organizer"}) /
            sum(kube_pod_container_resource_limits{namespace="law-organizer",resource="memory"}) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: High memory usage
            description: Memory usage is {{ $value | humanizePercentage }}

        # CPU Usage
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="law-organizer"}[5m])) /
            sum(kube_pod_container_resource_limits{namespace="law-organizer",resource="cpu"}) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: High CPU usage
            description: CPU usage is {{ $value | humanizePercentage }}

        # Database Connection Pool
        - alert: DatabaseConnectionPoolExhausted
          expr: |
            pg_stat_activity_count / pg_settings_max_connections > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Database connection pool nearly exhausted
            description: Connection pool usage is {{ $value | humanizePercentage }}

        # Redis Connection Issues
        - alert: RedisConnectionIssues
          expr: redis_up{namespace="law-organizer"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Redis is down
            description: Redis instance is not responding
---
# ============================================
# Grafana Dashboard ConfigMap
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: law-organizer-dashboard
  namespace: law-organizer
  labels:
    grafana_dashboard: "1"
data:
  law-organizer-dashboard.json: |
    {
      "dashboard": {
        "title": "Law Organizer - Application Metrics",
        "uid": "law-organizer",
        "panels": [
          {
            "title": "Request Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(http_requests_total{namespace=\"law-organizer\"}[5m])) by (service)",
                "legendFormat": "{{service}}"
              }
            ]
          },
          {
            "title": "Error Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(http_requests_total{namespace=\"law-organizer\",status=~\"5..\"}[5m])) by (service)",
                "legendFormat": "{{service}}"
              }
            ]
          },
          {
            "title": "Latency (P95)",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"law-organizer\"}[5m])) by (le, service))",
                "legendFormat": "{{service}}"
              }
            ]
          },
          {
            "title": "Memory Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(container_memory_working_set_bytes{namespace=\"law-organizer\"}) by (pod)",
                "legendFormat": "{{pod}}"
              }
            ]
          },
          {
            "title": "CPU Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"law-organizer\"}[5m])) by (pod)",
                "legendFormat": "{{pod}}"
              }
            ]
          }
        ]
      }
    }
