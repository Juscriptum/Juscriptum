# ============================================
# Frontend Deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: law-organizer-frontend
  namespace: law-organizer
  labels:
    app: law-organizer
    component: frontend
    version: v1
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: law-organizer
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: law-organizer
        component: frontend
        version: v1
    spec:
      # Security Context - Pod Level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      terminationGracePeriodSeconds: 10

      containers:
        - name: frontend
          image: ghcr.io/laworganizer/frontend:latest
          imagePullPolicy: Always

          # Security Context - Container Level
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Resource Limits
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          # Liveness Probe
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Readiness Probe
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Volume Mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx

      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}

      # Anti-affinity for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - law-organizer
                    - key: component
                      operator: In
                      values:
                        - frontend
                topologyKey: kubernetes.io/hostname
---
# ============================================
# Frontend Service
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: law-organizer-frontend
  namespace: law-organizer
  labels:
    app: law-organizer
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: law-organizer
    component: frontend
---
# ============================================
# Horizontal Pod Autoscaler - Frontend
# ============================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: law-organizer-frontend-hpa
  namespace: law-organizer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: law-organizer-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# ============================================
# Pod Disruption Budget - Frontend
# ============================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: law-organizer-frontend-pdb
  namespace: law-organizer
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: law-organizer
      component: frontend
